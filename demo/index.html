<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>SEAM — Technical Demo</title>
  <style>
    body {
      margin: 0;
      background: #0d1117;
      color: #c9d1d9;
      font-family: monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }

    h1  { font-size: 16px; margin-bottom: 4px; }
    p   { font-size: 12px; color: #6e7681; margin-bottom: 24px; }

    canvas {
      border: 1px solid #30363d;
      background: #161b22;
    }

    .controls {
      margin-top: 16px;
      display: flex;
      gap: 8px;
    }

    button {
      padding: 8px 16px;
      background: #161b22;
      border: 1px solid #30363d;
      color: #c9d1d9;
      font-family: monospace;
      font-size: 13px;
      cursor: pointer;
    }

    button:hover { border-color: #58a6ff; color: #58a6ff; }

    #log {
      margin-top: 16px;
      width: 480px;
      font-size: 12px;
      color: #6e7681;
      min-height: 60px;
    }

    #log span { color: #58a6ff; }
  </style>
</head>
<body>

  <h1>⚡ SEAM Engine — Technical Demo</h1>
  <p>Two nodes. One stitch. Watch the engine fire its events.</p>

  <canvas id="c" width="480" height="240"></canvas>

  <div class="controls">
    <button id="btn-stitch">stitch( A → B )</button>
    <button id="btn-sever">sever( A → B )</button>
    <button id="btn-ripple">ripple( A )</button>
  </div>

  <div id="log">Waiting for an operation...</div>

<script type="module">
  import { SeamCore, SeamModule } from '../src/SeamCore.js';

  // ─── Canvas setup ────────────────────────────────────────────────────────
  const canvas = document.getElementById('c');
  const ctx    = canvas.getContext('2d');
  const log    = document.getElementById('log');

  // Two fixed node positions — no layout algorithm needed for a demo this size.
  const NODES = {
    A: { x: 140, y: 120, label: 'Node A' },
    B: { x: 340, y: 120, label: 'Node B' },
  };

  // Visual state — the only thing the visualizer tracks.
  let stitched      = false;   // Is the edge currently drawn?
  let rippleActive  = false;   // Is a ripple ring animating?
  let rippleRadius  = 0;
  let flashNode     = null;    // Which node ID is currently flashing?

  // ─── Draw ────────────────────────────────────────────────────────────────
  // One function draws the entire frame from scratch each call.
  // This is the pattern you should copy into your own visualizer.
  //
  // CONTRIBUTOR: replace these draw calls with your renderer of choice
  // (SVG, Three.js, Pixi.js, etc.) — the SEAM event hooks below stay the same.

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Draw edge (only if the nodes are stitched)
    if (stitched) {
      ctx.beginPath();
      ctx.moveTo(NODES.A.x, NODES.A.y);
      ctx.lineTo(NODES.B.x, NODES.B.y);
      ctx.strokeStyle = '#58a6ff';
      ctx.lineWidth   = 2;
      ctx.stroke();

      // Arrowhead at Node B
      const angle = Math.atan2(NODES.B.y - NODES.A.y, NODES.B.x - NODES.A.x);
      const ax = NODES.B.x - Math.cos(angle) * 22;
      const ay = NODES.B.y - Math.sin(angle) * 22;
      ctx.beginPath();
      ctx.moveTo(ax + Math.cos(angle) * 10, ay + Math.sin(angle) * 10);
      ctx.lineTo(ax - Math.sin(angle) *  5, ay + Math.cos(angle) *  5);
      ctx.lineTo(ax + Math.sin(angle) *  5, ay - Math.cos(angle) *  5);
      ctx.closePath();
      ctx.fillStyle = '#58a6ff';
      ctx.fill();
    }

    // Draw ripple ring (if a ripple is in-flight)
    if (rippleActive) {
      const alpha = 1 - rippleRadius / 60;
      ctx.beginPath();
      ctx.arc(NODES.A.x, NODES.A.y, rippleRadius, 0, Math.PI * 2);
      ctx.strokeStyle = `rgba(88, 166, 255, ${alpha})`;
      ctx.lineWidth   = 2;
      ctx.stroke();
    }

    // Draw nodes
    for (const [id, pos] of Object.entries(NODES)) {
      const isFlashing = flashNode === id;

      ctx.beginPath();
      ctx.arc(pos.x, pos.y, 20, 0, Math.PI * 2);
      ctx.fillStyle   = '#0d1117';
      ctx.strokeStyle = isFlashing ? '#3fb950' : '#30363d';
      ctx.lineWidth   = isFlashing ? 3 : 2;
      if (isFlashing) { ctx.shadowColor = '#3fb950'; ctx.shadowBlur = 12; }
      ctx.fill();
      ctx.stroke();
      ctx.shadowBlur = 0;

      ctx.fillStyle    = '#c9d1d9';
      ctx.font         = '12px monospace';
      ctx.textAlign    = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(id, pos.x, pos.y);
    }
  }

  // ─── Animation loop ──────────────────────────────────────────────────────
  // Advances ripple radius each frame. Stops when the ring fades out.

  function tick() {
    if (rippleActive) {
      rippleRadius += 2;
      if (rippleRadius >= 60) { rippleActive = false; rippleRadius = 0; }
    }
    draw();
    requestAnimationFrame(tick);
  }

  requestAnimationFrame(tick);

  // ─── Engine bootstrap ────────────────────────────────────────────────────
  const engine = new SeamCore();

  engine.addNode('A', { label: 'Node A' });
  engine.addNode('B', { label: 'Node B' });

  // ─── Visualizer Module ───────────────────────────────────────────────────
  // This is the part you copy. One SeamModule, four event subscriptions.
  // It reads engine events and updates visual state — nothing more.
  //
  // It NEVER calls engine.stitch(), engine.sever(), or engine.ripple().
  // It NEVER calls ctx.cancel().
  // It only observes and draws.

  class DemoVisualizer extends SeamModule {
    install(engine) {

      // HOOK: before_stitch
      // Fires before the edge is added. ctx.cancel() would abort here.
      // Here we just log it — the mutation hasn't happened yet.
      this._unsubs.push(engine.on('before_stitch', (ctx) => {
        log.innerHTML = `<span>before_stitch</span> fired — "${ctx.fromId}" → "${ctx.toId}" (edge not yet added)`;
      }));

      // HOOK: after_stitch
      // Fires after the edge is confirmed. Safe to draw it now.
      this._unsubs.push(engine.on('after_stitch', (ctx) => {
        stitched  = true;
        flashNode = ctx.toId;
        setTimeout(() => { flashNode = null; }, 400);
        log.innerHTML = `<span>after_stitch</span> fired — edge exists. Drawing line.`;
      }));

      // HOOK: after_sever
      // Fires after the edge is removed. Remove the drawn line.
      this._unsubs.push(engine.on('after_sever', (ctx) => {
        stitched  = false;
        flashNode = null;
        log.innerHTML = `<span>after_sever</span> fired — edge removed. Erasing line.`;
      }));

      // HOOK: ripple_arrival
      // Fires once per node during BFS propagation.
      // ctx.depth = hops from origin (0 = origin node).
      this._unsubs.push(engine.on('ripple_arrival', (ctx) => {
        rippleActive = true;
        rippleRadius = 0;
        flashNode    = ctx.nodeId;
        setTimeout(() => { flashNode = null; }, 300);
        log.innerHTML = `<span>ripple_arrival</span> — node "${ctx.nodeId}" at depth ${ctx.depth}`;
      }));
    }
  }

  engine.use(new DemoVisualizer());

  // ─── Button wiring ───────────────────────────────────────────────────────
  // The buttons are the "game" here. In a real game, these calls would come
  // from player input, AI, physics callbacks, or a network message.

  document.getElementById('btn-stitch').onclick  = () => engine.stitch('A', 'B');
  document.getElementById('btn-sever').onclick   = () => engine.sever('A', 'B');
  document.getElementById('btn-ripple').onclick  = () => engine.ripple('A', { type: 'PING' });

</script>
</body>
</html>
